# ─── Point Arrmada at an EXISTING library ───────────────────────────────────────
# Copy this to  docker-compose.override.yml  (Compose merges it automatically), pick
# ONE of the setups below, edit the host paths, set the matching values in .env, then
# run ./update.sh.
#
# ⚠  NEVER mount media at /data — that path holds Arrmada's own database + config.
#    (Keep the DB in appdata instead via ARRMADA_DATA_HOST=/mnt/user/appdata/arrmada in .env.)

# ── Setup A: read-only trial (just catalog what you already have) ───────────────
# Mounts each library folder read-only so Arrmada can only READ + catalog — it can't
# move, rename, delete, or write anything. Nothing downloads.
services:
  arrmada-app:
    volumes:
      # host path : container path : read-only
      - /mnt/user/masterdirectory/media/movies:/movies:ro
      - /mnt/user/masterdirectory/media/tvshows:/tvshows:ro
      - /mnt/user/masterdirectory/media/ebooks:/ebooks:ro
      - /mnt/user/masterdirectory/media/audiobooks:/audiobooks:ro
# Then in .env:
#   ARRMADA_MOVIES_DIR=/movies
#   ARRMADA_TV_DIR=/tvshows
#   ARRMADA_EBOOKS_DIR=/ebooks
#   ARRMADA_AUDIOBOOKS_DIR=/audiobooks

# ── Setup B: full use — downloading WITH hardlinks (no wasted space) ────────────
# For hardlinks, the library AND the download folder must sit under ONE container
# mount. Mount the shared parent once into BOTH containers at /storage (any name but
# /data). qBittorrent downloads under /storage/torrents; Arrmada hardlinks into
# /storage/media/… — same filesystem, so no duplication and it keeps seeding.
#
# services:
#   arrmada-app:
#     volumes:
#       - /mnt/user/masterdirectory:/storage
#   arrmada-qbittorrent:
#     volumes:
#       - /mnt/user/masterdirectory:/storage
#
# Then in .env:
#   ARRMADA_MOVIES_DIR=/storage/media/movies
#   ARRMADA_TV_DIR=/storage/media/tvshows
#   ARRMADA_EBOOKS_DIR=/storage/media/ebooks
#   ARRMADA_AUDIOBOOKS_DIR=/storage/media/audiobooks
#   ARRMADA_DOWNLOADS_DIR=/storage/torrents
# And in qBittorrent (http://server:8080 → Settings → Downloads):
#   Incomplete:  /storage/torrents/incomplete
#   Save path:   /storage/torrents/seeding
