name: CI

# Guards every push and PR to main: the Go module must build, vet clean, and pass
# its full test suite; the embedded web UI must type-check and build. This is the
# net under all future changes — nothing merges red.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight run per ref; a newer push cancels the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go build, vet & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: Test (race)
        run: go test -race ./...

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build (tsc --noEmit + vite)
        run: npm run build
